proxy_cache_path /var/cache/nginx/telepublish levels=1:2 keys_zone=telepublish_cache:10m max_size=1g inactive=7d;

server {
    listen 80;
    server_name _;
    root /var/www/telepublish;

    location / {
        try_files $uri $uri/ =404;
    }

    location /bulletins {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /photo/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_cache telepublish_cache;
        proxy_cache_key "$uri";
        proxy_cache_valid 200 1d;
        proxy_cache_use_stale error timeout;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
