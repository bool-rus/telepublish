[build]                               # do not use zig cc for the builds
default-target = "x86_64-unknown-linux-gnu"    # use this target if none is explicitly provided
pre-build = [      
    "apt install -y unzip",
    "apt install -y openssl",
    "mkdir $HOME/.local",
    "cd $HOME/.local",
    "curl -L https://github.com/protocolbuffers/protobuf/releases/download/v30.2/protoc-30.2-linux-x86_64.zip -o archive.zip",
    "unzip archive.zip",
    "rm archive.zip",
    #"export PATH=\"$PATH:$HOME/.local/bin\"",
    "ln -s $HOME/.local/bin/protoc /usr/local/bin/protoc",
    "ln -s $HOME/.local/bin/protoc-gen-upb /usr/local/bin/protoc-gen-upb",
    "ln -s $HOME/.local/bin/protoc-gen-upb_minitable /usr/local/bin/protoc-gen-upb_minitable",
    "ln -s $HOME/.local/bin/protoc-gen-upbdefs /usr/local/bin/protoc-gen-upbdefs",
    "protoc --version"
]               