<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Объявления</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    padding: 24px 16px;
  }
  .container { max-width: 680px; margin: 0 auto; }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #333;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .card-date {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
  }
  .card-text {
    font-size: 16px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-photos {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .card-photos img {
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
    flex: 1 1 120px;
    min-width: 0;
    background: #eee;
    cursor: pointer;
  }
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 1000;
  }
  #lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
  }
  .load-more {
    display: block;
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 500;
    color: #555;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
    transition: background .15s;
  }
  .load-more:hover { background: #f0f0f0; }
  .load-more:disabled { opacity: .5; cursor: default; }
  .empty {
    text-align: center;
    color: #999;
    padding: 48px 0;
    font-size: 15px;
  }
  .error {
    text-align: center;
    color: #c00;
    padding: 24px 0;
    font-size: 14px;
  }
  @media (max-width: 480px) {
    body { padding: 16px 12px; }
    .card { padding: 16px; }
    .card-photos img { height: 160px; }
    #lightbox img { max-width: 95vw; max-height: 95vh; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Объявления</h1>
  <div id="feed"></div>
  <button class="load-more" id="loadMore" onclick="loadMore()">Показать ещё</button>
</div>
<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img"></div>
<script>
let offset = 0;
const limit = 10;
let loading = false;
let hasMore = true;

async function loadMore() {
  if (loading || !hasMore) return;
  loading = true;
  document.getElementById('loadMore').disabled = true;

  try {
    const res = await fetch('/bulletins?offset=' + offset);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (!data.bulletins || data.bulletins.length === 0) {
      hasMore = false;
      if (offset === 0) {
        document.getElementById('feed').innerHTML = '<div class="empty">Пока нет объявлений</div>';
      }
      return;
    }

    const feed = document.getElementById('feed');
    const empty = feed.querySelector('.empty');
    if (empty) empty.remove();

    for (const b of data.bulletins) {
      const card = document.createElement('div');
      card.className = 'card';

      const date = document.createElement('div');
      date.className = 'card-date';
      date.textContent = formatDate(b.ts);
      card.appendChild(date);

      if (b.text) {
        const text = document.createElement('div');
        text.className = 'card-text';
        text.textContent = b.text;
        card.appendChild(text);
      }

      if (b.photos && b.photos.length > 0) {
        const photos = document.createElement('div');
        photos.className = 'card-photos';
        for (const p of b.photos) {
          const img = document.createElement('img');
          img.src = p;
          img.alt = '';
          img.loading = 'lazy';
          img.onclick = (e) => { e.stopPropagation(); openLightbox(p); };
          photos.appendChild(img);
        }
        card.appendChild(photos);
      }

      feed.appendChild(card);
      offset++;
    }

    if (data.bulletins.length < limit) {
      hasMore = false;
    }
  } catch (e) {
    const feed = document.getElementById('feed');
    if (offset === 0) {
      feed.innerHTML = '<div class="error">Ошибка загрузки: ' + e.message + '</div>';
    }
  } finally {
    loading = false;
    document.getElementById('loadMore').disabled = !hasMore;
    document.getElementById('loadMore').style.display = hasMore ? 'block' : 'none';
  }
}

function formatDate(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('ru-RU', {
    day: 'numeric', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

loadMore();
</script>
</body>
</html>
